name: CI Pipeline

on:
  push:
    branches: [main, naveen-data-validation]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint Python files
        run: |
          flake8 api database scripts validation streamlit \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Check Python syntax
        run: |
          python -m compileall api database scripts validation streamlit airflow/dags

      - name: Run tests
        run: |
          pytest -q || test $? -eq 5
